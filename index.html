<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雑学カードバトル</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header id="score-board">
    <div class="player-score" id="score-a">Aさん: 0</div>
    <div class="target-info">先取 <span id="target-score">3</span> 点で勝利</div>
    <div class="player-score" id="score-b">Bさん: 0</div>
  </header>

  <main id="game-screen">
    <p id="turn-indicator"></p>

    <section id="phase-select" class="phase hidden">
      <p class="phase-message">出題する雑学を1つ選んでください</p>
      <div id="card-row" class="card-row"></div>
    </section>

    <section id="phase-guess" class="phase hidden">
      <p class="phase-message">この雑学は本当？ウソ？</p>
      <div class="card card-large" id="guess-card"></div>
      <div class="guess-buttons">
        <button id="btn-true" class="btn btn-true" type="button">本当</button>
        <button id="btn-false" class="btn btn-false" type="button">ウソ</button>
      </div>
    </section>

    <section id="phase-turn-result" class="phase hidden">
      <h2 id="result-heading"></h2>
      <div class="card card-large" id="result-card"></div>
      <p id="result-answer" class="result-answer"></p>
      <p id="result-explanation" class="explanation"></p>
      <button id="btn-next-turn" class="btn" type="button">次のターンへ</button>
    </section>
  </main>

  <section id="result-screen" class="hidden">
    <h1 id="winner-heading"></h1>
    <p id="final-score"></p>
    <h3>この対戦で出題された雑学</h3>
    <div id="history-list"></div>
    <button id="btn-restart" class="btn" type="button">もう一度あそぶ</button>
  </section>

  <div id="card-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="card card-expanded" id="modal-card"></div>
    <div class="modal-buttons">
      <button id="btn-decide" class="btn btn-decide" type="button">この雑学に決定する</button>
      <button id="btn-cancel" class="btn btn-cancel" type="button">戻る</button>
    </div>
  </div>

  <div id="pass-overlay" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="pass-message">
      <p id="pass-text"></p>
      <button id="btn-pass-ready" class="btn" type="button">準備完了</button>
    </div>
  </div>

</div>

<script type="module" src="gameEngine.js"></script>
<script type="module" src="ui.js"></script>
</body>
</html>
